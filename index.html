<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: white;
    }
    .container {
      text-align: center;
      padding: 60px 40px;
    }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 8px 20px;
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 30px;
      color: #a0c4ff;
    }
    h1 {
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 16px;
      background: linear-gradient(90deg, #ffffff, #a0c4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 1.15rem;
      color: rgba(255,255,255,0.6);
      max-width: 400px;
      line-height: 1.7;
      margin: 0 auto;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #a0c4ff;
      border-radius: 50%;
      margin: 30px 5px 0;
      animation: pulse 1.5s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.3s; }
    .dot:nth-child(3) { animation-delay: 0.6s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.4); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">✦ Stay Tuned</div>
    <h1>Coming Soon</h1>
    <p>We're working on something great. It'll be worth the wait — check back shortly!</p>
    <div>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>
</body>
</html>
